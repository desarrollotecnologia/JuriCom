<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="/app/assets/dm1.ico?v=3" type="image/x-icon" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Iniciar sesión · JURICOM_BEEF</title>
        <link rel="stylesheet" href="/static/styles/theme.css" />
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                background: linear-gradient(
                    135deg,
                    var(--color-primary) 0%,
                    var(--color-primary-dark) 100%
                );
            }
            .login-card {
                width: 100%;
                max-width: 400px;
                background: var(--color-surface);
                padding: 36px 32px;
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-lg);
            }
            .brand-logo {
                text-align: center;
                margin-bottom: 28px;
            }
            .brand-logo h1 {
                font-size: 1.6rem;
                color: var(--color-primary-dark);
                margin-bottom: 4px;
                letter-spacing: 1.5px;
                font-weight: 700;
            }
            .brand-logo p {
                color: var(--color-text-muted);
                font-size: 0.9rem;
            }
            .password-wrap {
                position: relative;
            }
            .password-wrap input {
                padding-right: 44px;
            }
            .password-toggle {
                position: absolute;
                right: 8px;
                top: 50%;
                transform: translateY(-50%);
                border: none;
                background: transparent;
                color: var(--color-text-muted);
                cursor: pointer;
                padding: 6px;
                border-radius: var(--radius-sm);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                line-height: 0;
            }
            .password-toggle:hover {
                color: var(--color-primary-dark);
            }
            .password-toggle:focus-visible {
                outline: 2px solid var(--color-primary);
                outline-offset: 2px;
            }
            .password-toggle svg {
                width: 18px;
                height: 18px;
            }
        </style>
    </head>
    <body>
        <div class="login-card">
            <div class="brand-logo">
                <h1>JURICOM_BEEF</h1>
                <p>Gestión de contratos · Colbeef</p>
            </div>

            <div class="alert alert-error" id="alert"></div>

            <form id="login-form">
                <div class="field">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                        autofocus
                    />
                </div>
                <div class="field">
                    <label for="password">Contraseña</label>
                    <div class="password-wrap">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            autocomplete="current-password"
                            required
                        />
                        <button
                            type="button"
                            class="password-toggle"
                            id="toggle-password"
                            aria-label="Mostrar contraseña"
                            aria-pressed="false"
                            title="Mostrar contraseña"
                        >
                            <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            <svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.8 21.8 0 0 1 5.06-5.94" />
                                <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.8 21.8 0 0 1-2.16 3.19" />
                                <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                    Ingresar
                </button>
            </form>
        </div>

        <script type="module">
            import { api, ApiError } from "/static/js/api/client.js";
            import { session } from "/static/js/auth/session.js";

            function homeForRole(role) {
                if (role === "compras") return "/app/compras/gestion-solicitudes.html";
                if (role === "juridica") return "/app/juridica/gestion-juridica.html";
                if (role === "solicitante") return "/app/compras/gestion-mis-solicitudes.html";
                if (role === "anticipos") return "/app/compras/gestion-anticipo.html";
                if (role === "lider_aprobador") return "/app/compras/gestion-aprobar-solicitudes.html";
                return "/app/dashboard.html";
            }

            const existingUser = session.getUser();
            if (session.isAuthenticated() && existingUser) {
                window.location.href = homeForRole(existingUser.role);
            }

            const form = document.getElementById("login-form");
            const alertBox = document.getElementById("alert");
            const submitBtn = document.getElementById("submit-btn");
            const passwordInput = document.getElementById("password");
            const togglePassword = document.getElementById("toggle-password");
            const iconEye = document.getElementById("icon-eye");
            const iconEyeOff = document.getElementById("icon-eye-off");

            togglePassword?.addEventListener("click", () => {
                const showing = passwordInput.type === "text";
                passwordInput.type = showing ? "password" : "text";
                togglePassword.setAttribute("aria-pressed", showing ? "false" : "true");
                const label = showing ? "Mostrar contraseña" : "Ocultar contraseña";
                togglePassword.setAttribute("aria-label", label);
                togglePassword.title = label;
                if (iconEye) iconEye.hidden = !showing;
                if (iconEyeOff) iconEyeOff.hidden = showing;
            });

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                alertBox.classList.remove("show");
                submitBtn.disabled = true;
                submitBtn.textContent = "Ingresando...";

                try {
                    session.clear();
                    const data = await api.post("/auth/login", {
                        username: form.username.value.trim(),
                        password: form.password.value,
                    });
                    session.setToken(data.access_token);
                    session.setUser(data.user);
                    window.location.href = homeForRole(data.user.role);
                } catch (err) {
                    const msg =
                        err instanceof ApiError
                            ? err.message
                            : "No se pudo conectar al servidor.";
                    alertBox.textContent = msg;
                    alertBox.classList.add("show");
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Ingresar";
                }
            });
        </script>
    </body>
</html>
