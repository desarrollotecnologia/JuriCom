<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Iniciar sesión · JURICOM_BEEF</title>
        <link rel="stylesheet" href="/static/styles/theme.css" />
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                background: linear-gradient(
                    135deg,
                    var(--color-primary) 0%,
                    var(--color-primary-dark) 100%
                );
            }
            .login-card {
                width: 100%;
                max-width: 400px;
                background: var(--color-surface);
                padding: 36px 32px;
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-lg);
            }
            .brand-logo {
                text-align: center;
                margin-bottom: 28px;
            }
            .brand-logo h1 {
                font-size: 1.6rem;
                color: var(--color-primary-dark);
                margin-bottom: 4px;
                letter-spacing: 1.5px;
                font-weight: 700;
            }
            .brand-logo p {
                color: var(--color-text-muted);
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <div class="login-card">
            <div class="brand-logo">
                <h1>JURICOM_BEEF</h1>
                <p>Gestión de contratos · Colbeef</p>
            </div>

            <div class="alert alert-error" id="alert"></div>

            <form id="login-form">
                <div class="field">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                        autofocus
                    />
                </div>
                <div class="field">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    />
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                    Ingresar
                </button>
            </form>
        </div>

        <script type="module">
            import { api, ApiError } from "/static/js/api/client.js";
            import { session } from "/static/js/auth/session.js";

            function homeForRole(role) {
                if (role === "compras") return "/app/compras/gestion-solicitudes.html";
                if (role === "juridica") return "/app/juridica/gestion-juridica.html";
                if (role === "solicitante") return "/app/compras/gestion-mis-solicitudes.html";
                if (role === "anticipos") return "/app/compras/gestion-anticipo.html";
                if (role === "lider_aprobador") return "/app/compras/gestion-aprobar-solicitudes.html";
                return "/app/dashboard.html";
            }

            const existingUser = session.getUser();
            if (session.isAuthenticated() && existingUser) {
                window.location.href = homeForRole(existingUser.role);
            }

            const form = document.getElementById("login-form");
            const alertBox = document.getElementById("alert");
            const submitBtn = document.getElementById("submit-btn");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                alertBox.classList.remove("show");
                submitBtn.disabled = true;
                submitBtn.textContent = "Ingresando...";

                try {
                    session.clear();
                    const data = await api.post("/auth/login", {
                        username: form.username.value.trim(),
                        password: form.password.value,
                    });
                    session.setToken(data.access_token);
                    session.setUser(data.user);
                    window.location.href = homeForRole(data.user.role);
                } catch (err) {
                    const msg =
                        err instanceof ApiError
                            ? err.message
                            : "No se pudo conectar al servidor.";
                    alertBox.textContent = msg;
                    alertBox.classList.add("show");
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Ingresar";
                }
            });
        </script>
    </body>
</html>
