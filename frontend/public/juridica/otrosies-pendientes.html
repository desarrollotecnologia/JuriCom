<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Otrosíes pendientes · JURICOM_BEEF</title>
        <link rel="stylesheet" href="/static/styles/theme.css" />
        <style>
            .otrosi-row {
                cursor: pointer;
            }
            .otrosi-row:hover {
                background: var(--color-surface-2);
            }
        </style>
    </head>
    <body>
        <div class="app-shell">
            <aside class="sidebar" id="sidebar"></aside>
            <main class="main">
                <div class="page-header">
                    <div>
                        <h1>Otrosíes pendientes</h1>
                        <p class="muted">
                            Solicitudes aprobadas por líder y gerencia. Haz clic en una fila para
                            abrir la edición del contrato, ver el otrosí, cargar el firmado y ajustar fechas.
                        </p>
                    </div>
                    <a class="btn btn-secondary" href="/app/juridica/gestion-juridica.html">
                        Volver
                    </a>
                </div>

                <div class="alert alert-error" id="alert-error"></div>
                <div class="alert alert-success" id="alert-success"></div>
                <div id="content" class="card">Cargando...</div>
            </main>
        </div>

        <script type="module">
            import { session } from "/static/js/auth/session.js";
            import { renderSidebar } from "/static/js/components/sidebar.js";
            import { api } from "/static/js/api/client.js";
            import { escapeHtml, formatDate } from "/static/js/utils/format.js";

            session.requireAuth();
            session.requireRole(["juridica", "admin"]);
            renderSidebar();

            const content = document.getElementById("content");
            const alertError = document.getElementById("alert-error");
            const alertSuccess = document.getElementById("alert-success");

            const TIPO_LABEL = {
                prorroga: "Prórroga",
                adicion: "Adición",
                modificacion: "Modificación",
                otro: "Otro",
            };

            function showError(message) {
                alertSuccess.classList.remove("show");
                alertError.textContent = message;
                alertError.classList.add("show");
                setTimeout(() => alertError.classList.remove("show"), 7000);
            }

            function showSuccess(message) {
                alertError.classList.remove("show");
                alertSuccess.textContent = message;
                alertSuccess.classList.add("show");
                setTimeout(() => alertSuccess.classList.remove("show"), 5000);
            }

            function render(items) {
                if (!items.length) {
                    content.innerHTML = '<p class="muted">No hay otrosíes pendientes para Jurídica.</p>';
                    return;
                }
                const filas = items.map((item) => {
                    const c = item.contrato;
                    const o = item.otrosi;
                    const url = `/app/juridica/editar-contrato.html?codigo=${encodeURIComponent(c.codigo)}&otrosi=${o.id}`;
                    return `
                        <tr class="otrosi-row" data-url="${url}">
                            <td><span class="codigo-contrato">${escapeHtml(c.codigo)}</span></td>
                            <td>${escapeHtml(c.proveedor_contratista)}</td>
                            <td>${TIPO_LABEL[o.tipo] || o.tipo}</td>
                            <td>${formatDate(o.created_at)}</td>
                            <td><a class="btn btn-sm btn-primary" href="${url}">Ver / finalizar</a></td>
                        </tr>
                    `;
                }).join("");
                content.innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Código</th><th>Proveedor</th><th>Tipo aprobado</th>
                                <th>Solicitado</th><th></th>
                            </tr>
                        </thead>
                        <tbody>${filas}</tbody>
                    </table>
                `;
                content.querySelectorAll(".otrosi-row").forEach((row) => {
                    row.addEventListener("click", (event) => {
                        if (event.target.closest("a")) return;
                        window.location.href = row.dataset.url;
                    });
                });
            }

            async function load() {
                try {
                    const items = await api.get("/contratos/otrosies/pendientes");
                    render(items);
                } catch (err) {
                    content.innerHTML = "";
                    showError(err.message);
                }
            }

            load();
        </script>
    </body>
</html>
